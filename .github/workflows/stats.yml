name: Update org stats

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/update-stats.mjs
      - .github/workflows/stats.yml

permissions:
  contents: write

concurrency:
  group: org-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate stats block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: node scripts/update-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- profile/README.md; then
            echo "No stat changes."
          else
            git commit -m "chore: refresh org stats" -- profile/README.md
            git push
          fi
